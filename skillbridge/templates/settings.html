{% extends "base.html" %}
{% block content %}
<h1>Settings</h1>

{% if saved %}<div class="notice">✅ Settings saved.</div>{% endif %}
{% if test_result %}<div class="notice">{{ test_result }}</div>{% endif %}
{% if mock %}<div class="notice">🧪 Mock mode is ON (SKILLBRIDGE_MOCK_LLM=1) — no real model is used.</div>{% endif %}

<div class="card">
  <form action="/settings" method="post">
    <p><label>Obsidian vault folder<br>
      <input type="text" name="vault_path" value="{{ cfg.vault_path }}"></label></p>
    <p><label>Ollama model name (run <code>ollama list</code> to see what's installed)<br>
      <input type="text" name="model_tag" value="{{ cfg.model_tag }}"></label></p>
    <p><label>Ollama address (leave as-is unless you know it changed)<br>
      <input type="text" name="ollama_url" value="{{ cfg.ollama_url }}"></label></p>
    <p><label>Web port (changing it requires a restart)<br>
      <input type="number" name="port" value="{{ cfg.port }}"></label></p>
    <div class="row">
      <button type="submit">Save settings</button>
    </div>
  </form>
  <form action="/settings/test" method="post" style="margin-top:0.8rem">
    <button class="secondary" type="submit">Test connection to Ollama</button>
  </form>
</div>
{% endblock %}
