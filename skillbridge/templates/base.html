<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillBridge</title>
<style>
  :root { --ink:#1a1d21; --muted:#5b6470; --line:#e3e6ea; --accent:#2d6cdf;
          --ok:#1e8e3e; --warn:#c5221f; --bg:#f7f8fa; --card:#ffffff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, sans-serif;
         color:var(--ink); background:var(--bg); line-height:1.5; }
  header { background:var(--card); border-bottom:1px solid var(--line);
           padding:0.8rem 1.2rem; display:flex; gap:1.5rem; align-items:baseline; }
  header .brand { font-weight:700; font-size:1.15rem; }
  header a { color:var(--muted); text-decoration:none; }
  header a:hover { color:var(--accent); }
  main { max-width: 960px; margin:1.5rem auto; padding:0 1.2rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
          padding:1.1rem 1.3rem; margin-bottom:1.1rem; }
  h1 { font-size:1.35rem; margin:0 0 0.8rem; }
  h2 { font-size:1.05rem; margin:0 0 0.6rem; }
  .muted { color:var(--muted); font-size:0.92rem; }
  .ok { color:var(--ok); } .warn { color:var(--warn); }
  .pill { display:inline-block; padding:0.1rem 0.6rem; border-radius:999px;
          font-size:0.8rem; font-weight:600; border:1px solid var(--line); }
  .pill.FULL { background:#e6f4ea; color:var(--ok); }
  .pill.PARTIAL { background:#fef7e0; color:#a56b00; }
  .pill.CLAUDE-ONLY, .pill.claude-only { background:#fce8e6; color:var(--warn); }
  textarea { width:100%; min-height:220px; font-family:ui-monospace, monospace;
             font-size:0.85rem; border:1px solid var(--line); border-radius:8px;
             padding:0.7rem; }
  button, .btn { background:var(--accent); color:#fff; border:none; border-radius:8px;
           padding:0.45rem 1rem; font-size:0.92rem; cursor:pointer; text-decoration:none; }
  button.secondary { background:#eef1f5; color:var(--ink); }
  button.ghost { background:none; color:var(--accent); }
  input[type=text], input[type=number] { border:1px solid var(--line); border-radius:8px;
           padding:0.45rem 0.7rem; font-size:0.95rem; width:100%; }
  table { border-collapse:collapse; width:100%; font-size:0.92rem; }
  th, td { text-align:left; border-bottom:1px solid var(--line); padding:0.5rem 0.6rem; }
  form.inline { display:inline; }
  .row { display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }
  .spacer { flex:1; }
  .notice { padding:0.6rem 0.9rem; border-radius:8px; background:#e8f0fe; margin-bottom:1rem; }
  .notice.error { background:#fce8e6; }
  pre.rule { white-space:pre-wrap; background:#f1f3f6; border-radius:8px; padding:0.8rem; }
</style>
</head>
<body>
<header>
  <span class="brand">🌉 SkillBridge</span>
  <a href="/">Home</a>
  <a href="/registry">Registry</a>
  <a href="/settings">Settings</a>
  <span class="spacer"></span>
  <span class="muted">local only · nothing leaves this machine</span>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
